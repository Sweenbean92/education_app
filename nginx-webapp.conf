# Nginx proxy timeouts for the education webapp (Ollama/LLM can be slow).
# Use this inside your server { } block, in the location that proxies to the app:
#
#   location / {
#       proxy_pass http://127.0.0.1:5000;
#       proxy_http_version 1.1;
#       proxy_set_header Host $host;
#       proxy_set_header X-Real-IP $remote_addr;
#       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#       proxy_set_header X-Forwarded-Proto $scheme;
#       # Long timeouts for LLM feedback (default is 60s; 504 = gateway timeout)
#       proxy_connect_timeout 300s;
#       proxy_send_timeout 300s;
#       proxy_read_timeout 300s;
#   }
#
# Then: sudo nginx -t && sudo systemctl reload nginx
