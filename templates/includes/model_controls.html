<div class="performance-control" style="display: flex; align-items: center; gap: 10px;">
    <label for="model-select" style="color: #6FFFE9; font-size: 14px; white-space: nowrap;">Model:</label>
    <select id="model-select" 
            style="padding: 6px 12px; border-radius: 6px; background: #1C2541; color: #6FFFE9; border: 1px solid #5BC0BE; cursor: pointer; font-size: 14px;"
            onchange="switchModel(this.value)">
        <option value="smollm2:360m" selected>SmollM2 360M</option>
        <option value="smollfinetuned">SmollM2 Finetuned</option>
    </select>
</div>
